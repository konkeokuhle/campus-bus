{% extends "base.html" %}
{% block title %}Student Dashboard{% endblock %}
{% block content %}
<div class="row">
    <div class="col-md-12 mb-4">
        <h2>Welcome, {{ session.full_name }}!</h2>
        <p class="lead">Track your bus in real-time</p>
    </div>
</div>

<div class="row">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0">Live Bus Tracking</h5>
            </div>
            <div class="card-body p-0">
                <div id="map" style="height: 500px;"></div>
            </div>
        </div>
    </div>
    
    <div class="col-md-4">
        <div class="card">
            <div class="card-header bg-success text-white">
                <h5 class="mb-0">Active Buses</h5>
            </div>
            <div class="card-body">
                <div id="bus-list">
                    <div class="text-center">
                        <div class="spinner-border text-primary" role="status">
                            <span class="visually-hidden">Loading...</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="card mt-3">
            <div class="card-header bg-info text-white">
                <h5 class="mb-0">Your Favorite Routes</h5>
            </div>
            <div class="card-body">
                <p class="text-muted">No favorite routes yet.</p>
                <button class="btn btn-sm btn-outline-primary">Add Route</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    // Initialize map
    var map = L.map('map').setView([40.712776, -74.005974], 13);
    
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
    }).addTo(map);
    
    // Bus icons
    var busIcon = L.icon({
        iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-blue.png',
        shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
        iconSize: [25, 41],
        iconAnchor: [12, 41],
        popupAnchor: [1, -34],
        shadowSize: [41, 41]
    });
    
    // Store bus markers
    var busMarkers = {};
    
    // Connect to Socket.IO
    var socket = io();
    
    // Load initial buses
    fetch('/api/live-buses')
        .then(response => response.json())
        .then(buses => {
            updateBusList(buses);
            updateMapMarkers(buses);
        });
    
    // Listen for real-time updates
    socket.on('bus_location_updated', function(data) {
        updateBusMarker(data);
    });
    
    function updateBusList(buses) {
        var busListHtml = '';
        if (buses.length === 0) {
            busListHtml = '<p class="text-muted">No active buses at the moment</p>';
        } else {
            buses.forEach(bus => {
                busListHtml += `
                    <div class="card mb-2">
                        <div class="card-body py-2">
                            <h6 class="mb-1">🚌 ${bus.bus_number}</h6>
                            <small class="text-muted d-block">Route: ${bus.route || 'Unknown'}</small>
                            <small class="text-muted d-block">Next: ${bus.next_stop || 'Unknown'}</small>
                            <small class="text-success">Speed: ${bus.speed || 0} km/h</small>
                        </div>
                    </div>
                `;
            });
        }
        document.getElementById('bus-list').innerHTML = busListHtml;
    }
    
    function updateMapMarkers(buses) {
        // Clear existing markers
        for (var id in busMarkers) {
            map.removeLayer(busMarkers[id]);
        }
        busMarkers = {};
        
        // Add new markers
        buses.forEach(bus => {
            if (bus.latitude && bus.longitude) {
                var marker = L.marker([bus.latitude, bus.longitude], {icon: busIcon})
                    .bindPopup(`
                        <b>${bus.bus_number}</b><br>
                        Route: ${bus.route}<br>
                        Next: ${bus.next_stop}<br>
                        Speed: ${bus.speed} km/h
                    `);
                marker.addTo(map);
                busMarkers[bus.bus_id] = marker;
            }
        });
    }
    
    function updateBusMarker(data) {
        if (busMarkers[data.bus_id]) {
            busMarkers[data.bus_id].setLatLng([data.latitude, data.longitude]);
        }
    }
    
    // Refresh bus list every 10 seconds
    setInterval(() => {
        fetch('/api/live-buses')
            .then(response => response.json())
            .then(buses => {
                updateBusList(buses);
            });
    }, 10000);
</script>
{% endblock %}
